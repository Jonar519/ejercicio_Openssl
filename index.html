<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cliente WebSocket Seguro</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        .conectado { color: green; }
        .desconectado { color: red; }
        .datos { background: #f0f0f0; padding: 10px; margin: 10px 0; }
        button { padding: 10px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🔌 Cliente WebSocket WSS</h1>
    
    <div>
        <button onclick="conectar()">🔌 Conectar</button>
        <button onclick="desconectar()">❌ Desconectar</button>
        <button onclick="enviarMensaje()">📤 Enviar mensaje</button>
    </div>

    <p>Estado: <span id="estado" class="desconectado">Desconectado</span></p>
    <p>URL: wss://localhost:8080</p>
    
    <div id="datos" class="datos">
        Esperando conexión...
    </div>

    <script>
        let socket = null;
        const datosDiv = document.getElementById('datos');
        const estadoSpan = document.getElementById('estado');

        function conectar() {
            try {
                datosDiv.innerHTML = 'Conectando...';
                
                // IMPORTANTE: Usar wss:// para WebSocket Secure
                socket = new WebSocket('wss://localhost:8080');
                
                // Para certificado autofirmado
                socket.onerror = function(error) {
                    console.error('Error:', error);
                    datosDiv.innerHTML = '❌ Error de conexión. ¿Aceptaste el certificado?';
                };

                socket.onopen = function() {
                    console.log('Conectado!');
                    estadoSpan.innerHTML = 'Conectado';
                    estadoSpan.className = 'conectado';
                    datosDiv.innerHTML = '✅ Conectado al servidor<br>';
                };

                socket.onmessage = function(event) {
                    console.log('Mensaje:', event.data);
                    try {
                        const datos = JSON.parse(event.data);
                        datosDiv.innerHTML = '📦 Datos recibidos:<br>' + 
                            JSON.stringify(datos, null, 2).replace(/\n/g, '<br>');
                    } catch (e) {
                        datosDiv.innerHTML = '📨 Mensaje: ' + event.data;
                    }
                };

                socket.onclose = function() {
                    console.log('Desconectado');
                    estadoSpan.innerHTML = 'Desconectado';
                    estadoSpan.className = 'desconectado';
                    datosDiv.innerHTML = '❌ Conexión cerrada';
                };

            } catch (error) {
                console.error('Error al conectar:', error);
                datosDiv.innerHTML = '❌ Error: ' + error.message;
            }
        }

        function desconectar() {
            if (socket) {
                socket.close();
            }
        }

        function enviarMensaje() {
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({
                    type: 'ping',
                    cliente: 'browser',
                    timestamp: new Date().toISOString()
                }));
                datosDiv.innerHTML = '📤 Mensaje enviado';
            } else {
                alert('No conectado');
            }
        }

        // Auto-conectar al cargar la página
        window.onload = function() {
            setTimeout(conectar, 1000);
        };
    </script>
</body>
</html>
